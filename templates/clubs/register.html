{% extends 'clubs/base.html' %}

{% block title %}注册 - 智枢青寰{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow" style="border-radius:16px;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus" style="font-size: 3rem; color: #3B82F6;"></i>
                        <h3 class="mt-3">注册</h3>
                        <p class="text-muted">加入智枢青寰</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                        <div class="alert alert-danger">
                            {% for field, errors in form.errors.items %}
                                {% for error in errors %}
                                    {{ error }}
                                {% endfor %}
                            {% endfor %}
                        </div>
                        {% endif %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" id="id_username" required style="border-radius:10px;padding:12px;">
                        </div>

                        <div class="mb-3">
                            <label for="id_email" class="form-label">邮箱</label>
                            <input type="email" name="email" class="form-control" id="id_email" required style="border-radius:10px;padding:12px;">
                        </div>

                        <div class="mb-3">
                            <label for="id_password1" class="form-label">密码</label>
                            <input type="password" name="password1" class="form-control" id="id_password1" required style="border-radius:10px;padding:12px;">
                        </div>

                        <div class="mb-3">
                            <label for="id_password2" class="form-label">确认密码</label>
                            <input type="password" name="password2" class="form-control" id="id_password2" required style="border-radius:10px;padding:12px;">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3" style="border-radius:10px;padding:12px;background:linear-gradient(135deg, #1E3A5F, #3B82F6);border:none;">
                            <i class="bi bi-person-plus"></i> 注册
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted">已有账号？
                            <a href="{% url 'login' %}" style="color:#3B82F6;">立即登录</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
