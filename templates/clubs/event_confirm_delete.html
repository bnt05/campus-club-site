{% extends 'clubs/base.html' %}

{% block title %}删除活动 - 校园社团网{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 确认删除</h4>
                </div>
                <div class="card-body">
                    <p>确定要删除活动 <strong>"{{ event.title }}"</strong> 吗？</p>
                    <p class="text-muted">此操作不可恢复！</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'event_detail' event.id %}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-danger">确认删除</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
