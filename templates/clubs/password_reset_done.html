{% extends 'clubs/base.html' %}

{% block title %}邮件已发送 - 校园社团网{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-envelope-check text-success" style="font-size: 4rem;"></i>
                    <h3 class="mt-4">检查你的邮箱</h3>
                    <p class="text-muted mt-3">
                        我们已经发送了一封密码重置邮件到你的邮箱。<br>
                        请点击邮件中的链接来重置你的密码。
                    </p>
                    <p class="text-muted small mt-4">
                        如果你没有收到邮件，请检查你的垃圾邮件文件夹。
                    </p>
                    
                    <div class="mt-4">
                        <a href="{% url 'login' %}" class="btn btn-outline-primary">返回登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
