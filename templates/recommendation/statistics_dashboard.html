    <!-- 页面标题 -->

    </div>

    <!-- 概览卡片 -->
    <div class="overview-cards">
      <div class="stat-card">
        <div class="stat-icon blue">
          <i class="el-icon-user"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stats.total_users || 0 }}</span>
          <span class="stat-label">注册用户</span>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon green">
          <i class="el-icon-office-building"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stats.total_clubs || 0 }}</span>
          <span class="stat-label">社团总数</span>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon orange">
          <i class="el-icon-calendar"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stats.total_activities || 0 }}</span>
          <span class="stat-label">活动总数</span>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon purple">
          <i class="el-icon-connection"></i>
        </div>
        <div class="stat-info">
          <span class="stat-value">{{ stats.total_participations || 0 }}</span>
          <span class="stat-label">参与人次</span>
        </div>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="charts-grid">
      <!-- 社团分类分布 -->
      <div class="chart-card">
        <h3>社团分类分布</h3>
        <div class="chart-container">
          <div ref="categoryChart" style="width: 100%; height: 300px;"></div>
        </div>
      </div>

      <!-- 社团人数排行 -->
      <div class="chart-card">
        <h3>热门社团 TOP10</h3>
        <div class="chart-container">
          <div ref="hotClubsChart" style="width: 100%; height: 300px;"></div>
        </div>
      </div>

      <!-- 学生年级分布 -->
      <div class="chart-card">

      <!-- 活动类型分布 -->
      <div class="chart-card">

      <!-- 活动时间热力图 -->
      <div class="chart-card full-width">

        <div class="chart-container">
          <div ref="heatmapChart" style="width: 100%; height: 200px;"></div>
        </div>
      </div>

      <!-- 活动时间线 -->
      <div class="chart-card full-width">

        <div class="timeline-container">
          <div

            :key="activity.id"
          >
            <div class="timeline-date">
              {{ activity.start_time }}
            </div>
            <div class="timeline-content">
              <h4>{{ activity.title }}</h4>
              <p>{{ activity.club_name }} · {{ activity.location }}</p>
              <div class="timeline-meta">
                <el-tag size="mini" type="success">{{ activity.type }}</el-tag>
                <span>👥 {{ activity.participants }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 推荐效果统计（仅登录用户可见） -->
    <div class="recommendation-stats" v-if="isLoggedIn">
      <h2>🤖 推荐效果分析</h2>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-number">{{ recStats.total_recommendations || 0 }}</span>
          <span class="stat-desc">推荐次数</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">{{ recStats.viewed || 0 }}</span>
          <span class="stat-desc">查看次数</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">{{ recStats.interested || 0 }}</span>
          <span class="stat-desc">感兴趣</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">{{ recStats.avg_score || 0 }}%</span>
          <span class="stat-desc">平均匹配度</span>
        </div>
      </div>

<script>
import * as echarts from 'echarts'

export default {
  name: 'StatisticsDashboard',
  
  data() {
    return {
      isLoggedIn: false,
      stats: {},
      clubStats: {},
      activityStats: {},
      studentStats: {},
      heatmapData: {},
      timeline: [],
      recStats: {}
    }
  },
  
  async created() {
    this.isLoggedIn = this.$store?.state?.user?.isAuthenticated
    await this.loadAllData()
    this.$nextTick(() => {
      this.initCharts()
    })
  },
  
  methods: {
    async loadAllData() {
      await Promise.all([
        this.loadOverviewStats(),
        this.loadClubStats(),
        this.loadActivityStats(),
        this.loadStudentStats(),
        this.loadHeatmap(),
        this.loadTimeline(),
        this.isLoggedIn && this.loadRecStats()
      ].filter(Boolean))
    },
    
    async loadOverviewStats() {
      try {
        const res = await this.$http.get('/api/recommend/stats/overview/')
        if (res.data.code === 200) {
          this.stats = res.data.data
        }
      } catch (e) {
        console.error('Load overview stats error:', e)
      }
    },
    
    async loadClubStats() {
      try {
        const res = await this.$http.get('/api/recommend/stats/clubs/')
        if (res.data.code === 200) {
          this.clubStats = res.data.data
          this.initCategoryChart()
          this.initHotClubsChart()
        }
      } catch (e) {
        console.error('Load club stats error:', e)
      }
    },
    
    async loadActivityStats() {
      try {
        const res = await this.$http.get('/api/recommend/stats/activities/')
        if (res.data.code === 200) {
          this.activityStats = res.data.data
          this.initActivityTypeChart()
        }
      } catch (e) {
        console.error('Load activity stats error:', e)
      }
    },
    
    async loadStudentStats() {
      try {
        const res = await this.$http.get('/api/recommend/stats/students/')
        if (res.data.code === 200) {
          this.studentStats = res.data.data
          this.initGradeChart()
        }
      } catch (e) {
        console.error('Load student stats error:', e)
      }
    },
    
    async loadHeatmap() {
      try {
        const res = await this.$http.get('/api/recommend/stats/heatmap/')
        if (res.data.code === 200) {
          this.heatmapData = res.data.data
          this.initHeatmapChart()
        }
      } catch (e) {
        console.error('Load heatmap error:', e)
      }
    },
    
    async loadTimeline() {
      try {
        const res = await this.$http.get('/api/recommend/timeline/?days=30')
        if (res.data.code === 200) {
          this.timeline = res.data.data || []
        }
      } catch (e) {
        console.error('Load timeline error:', e)
      }
    },
    
    async loadRecStats() {
      try {
        const res = await this.$http.get('/api/recommend/stats/recommendation/')
        if (res.data.code === 200) {
          this.recStats = res.data.data
        }
      } catch (e) {
        console.error('Load rec stats error:', e)
      }
    },
    
    initCharts() {
      this.initCategoryChart()
      this.initHotClubsChart()
      this.initGradeChart()
      this.initActivityTypeChart()
      this.initHeatmapChart()
    },
    
    initCategoryChart() {
      if (!this.clubStats.category_stats) return
      
      const chart = echarts.init(this.$refs.categoryChart)
      const data = this.clubStats.category_stats.map(item => ({
        name: this.getCategoryName(item.category),
        value: item.count
      }))
      
      const option = {
        tooltip: {
          trigger: 'item',
          formatter: '{b}: {c} ({d}%)'
        },
        legend: {
          orient: 'vertical',
          left: 'left'
        },
        series: [{
          name: '社团分类',
          type: 'pie',
          radius: ['40%', '70%'],
          avoidLabelOverlap: false,
          itemStyle: {
            borderRadius: 10,
            borderColor: '#fff',
            borderWidth: 2
          },
          label: {
            show: true,
            formatter: '{b}: {c}'
          },
          data: data,
          color: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4', '#ea7ccc']
        }]
      }
      
      chart.setOption(option)
      window.addEventListener('resize', () => chart.resize())
    },
    
    initHotClubsChart() {
      if (!this.clubStats.hot_clubs) return
      
      const chart = echarts.init(this.$refs.hotClubsChart)
      const data = this.clubStats.hot_clubs.slice(0, 10)
      
      const option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' }
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          containLabel: true
        },
        xAxis: {
          type: 'value'
        },
        yAxis: {
          type: 'category',
          data: data.map(item => item.name).reverse(),
          axisLabel: {
            interval: 0,
            fontSize: 12
          }
        },
        series: [{
          name: '成员数',
          type: 'bar',
          data: data.map(item => item.member_count).reverse(),
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
              { offset: 0, color: '#667eea' },
              { offset: 1, color: '#764ba2' }
            ]),
            borderRadius: [0, 4, 4, 0]
          },
          label: {
            show: true,
            position: 'right',
            formatter: '{c}'
          }
        }]
      }
      
      chart.setOption(option)
      window.addEventListener('resize', () => chart.resize())
    },
    
    initGradeChart() {
      if (!this.studentStats.grade_stats) return
      
      const chart = echarts.init(this.$refs.gradeChart)
      const gradeMap = { '1': '大一', '2': '大二', '3': '大三', '4': '大四', '5': '大五', '6': '研究生' }
      
      const data = this.studentStats.grade_stats.map(item => ({
        name: gradeMap[item.grade] || item.grade,
        value: item.count
      }))
      
      const option = {
        tooltip: {
          trigger: 'item'
        },
        series: [{
          name: '年级分布',
          type: 'pie',
          radius: ['45%', '70%'],
          center: ['50%', '50%'],
          avoidLabelOverlap: true,
          itemStyle: {
            borderRadius: 8,
            borderColor: '#fff',
            borderWidth: 2
          },
          label: {
            show: true,
            formatter: '{b}: {c}',
            fontSize: 12
          },
          data: data,
          color: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272']
        }]
      }
      
      chart.setOption(option)
      window.addEventListener('resize', () => chart.resize())
    },
    
    initActivityTypeChart() {
      if (!this.activityStats.type_stats) return
      
      const chart = echarts.init(this.$refs.activityTypeChart)
      const typeMap = {
        'competition': '比赛',
        'training': '培训',
        'social': '社交',
        'public_welfare': '公益',
        'academic': '学术',
        'entertainment': '娱乐',
        'other': '其他'
      }
      
      const data = this.activityStats.type_stats.map(item => ({
        name: typeMap[item.activity_type] || item.activity_type,
        value: item.count
      }))
      
      const option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' }
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          data: data.map(item => item.name),
          axisLabel: { interval: 0, rotate: 0 }
        },
        yAxis: {
          type: 'value'
        },
        series: [{
          name: '活动数量',
          type: 'bar',
          data: data.map(item => item.value),
          itemStyle: {
            color: '#5470c6',
            borderRadius: [4, 4, 0, 0]
          },
          label: {
            show: true,
            position: 'top'
          }
        }]
      }
      
      chart.setOption(option)
      window.addEventListener('resize', () => chart.resize())
    },
    
    initHeatmapChart() {
      if (!this.heatmapData.monthly) return
      
      const chart = echarts.init(this.$refs.heatmapChart)
      
      // 将月度数据转换为热力图格式
      const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
      const weekdays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日']
      
      // 简化：月度数据用柱状图展示
      const option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' }
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '3%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          data: months,
          axisLabel: { interval: 0 }
        },
        yAxis: {
          type: 'value'
        },
        series: [{
          name: '活动数量',
          type: 'bar',
          data: this.heatmapData.monthly,
          itemStyle: {
            color: function(params) {
              const colorList = ['#e8f3ff', '#a8d4ff', '#5eb0ff', '#1e8cff', '#0066cc']
              const idx = Math.min(Math.floor(params.value / 5), 4)
              return colorList[idx]
            },
            borderRadius: [4, 4, 0, 0]
          }
        }]
      }
      
      chart.setOption(option)
      window.addEventListener('resize', () => chart.resize())
    },
    
    getCategoryName(category) {
      const names = {
        'sports': '体育运动',
        'arts': '文艺表演',
        'culture': '传统文化',
        'academic': '学术科创',
        'public_welfare': '公益实践',
        'interest': '兴趣生活'
      }
      return names[category] || category
    }
  }
}
</script>
