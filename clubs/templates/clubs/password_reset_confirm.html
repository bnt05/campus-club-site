{% extends 'clubs/base.html' %}

{% block title %}设置新密码{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-4">设置新密码</h2>
                    {% if validlink %}
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100">重置密码</button>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">链接已失效或已过期，请重新发起密码重置。</div>
                        <a href="{% url 'password_reset' %}" class="btn btn-outline-primary w-100">重新发起</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
{% endblock %}
