{% extends 'clubs/base.html' %}

{% block title %}找回密码{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title mb-4">找回密码</h2>
                    <p>请输入注册邮箱，我们会发送密码重置链接。</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">发送邮件</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
