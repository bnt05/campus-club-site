<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

    let aiChatOpen = false;
    let aiConversationHistory = [];
    
    function toggleAiChat() {
        aiChatOpen = !aiChatOpen;
        const chatBox = document.getElementById('aiChatBox');
        const btn = document.getElementById('aiFloatingBtn');
        const icon = document.getElementById('aiFloatIcon');
        
        if (aiChatOpen) {
            chatBox.classList.add('active');
            icon.innerHTML = '✨';
            setTimeout(() => {
                document.getElementById('aiChatInput').focus();
            }, 100);
        } else {
            chatBox.classList.remove('active');
            icon.innerHTML = '🤖';
        }
    }
    
    function addAiMessage(content, role) {
        const messagesDiv = document.getElementById('aiChatMessages');
        const timeDiv = messagesDiv.querySelector('.ai-message-time');
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `ai-chat-message ${role}`;
        
        const avatar = role === 'user' ? '👤' : '🤖';
        const name = role === 'user' ? '我' : '校园小C';
        
        // 格式化AI回复内容
        let formattedContent = formatAIResponse(content);
        
        msgDiv.innerHTML = `
            <div class="ai-msg-avatar-sm">${avatar}</div>
            <div class="ai-msg-bubble ${role}">
                ${role === 'assistant' ? `<div class="ai-msg-name">${name}</div>` : ''}
                <div class="ai-msg-text">${formattedContent}</div>
            </div>
        `;
        
        // 移除时间标签（如果有）
        if (timeDiv) {
            timeDiv.remove();
        }
        
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    // 格式化AI回复内容
    function formatAIResponse(text) {
        if (!text) return '';
        
        // 1. 先进行HTML转义，防止XSS
        let formatted = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        
        // 2. 转换Markdown格式
        // 标题 (# 标题)
        formatted = formatted.replace(/^### (.+)$/gm, '<h4 style="margin: 10px 0 5px; font-size: 14px; font-weight: 600;">$1</h4>');
        formatted = formatted.replace(/^## (.+)$/gm, '<h3 style="margin: 12px 0 6px; font-size: 15px; font-weight: 600;">$1</h3>');
        formatted = formatted.replace(/^# (.+)$/gm, '<h2 style="margin: 14px 0 8px; font-size: 16px; font-weight: 600;">$1</h2>');
        
        // 3. 粗体和斜体
        formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong style="font-weight: 600;">$1</strong>');
        formatted = formatted.replace(/\*(.+?)\*/g, '<em style="font-style: italic;">$1</em>');
        
        // 4. 处理列表项
        // 先将每一行的列表项单独处理
        const lines = formatted.split('\n');
        let inList = false;
        let resultLines = [];
        
        for (let line of lines) {
            // 匹配各种列表格式：• 或 - 或 * 或 数字.
            const listMatch = line.match(/^(\s*)([•\-\*]|\d+\.)\s+(.+)$/);
            
            if (listMatch) {
                if (!inList) {
                    resultLines.push('<ul style="margin: 8px 0; padding-left: 20px;">');
                    inList = true;
                }
                resultLines.push(`<li style="margin: 4px 0;">${listMatch[3]}</li>`);
            } else {
                if (inList) {
                    resultLines.push('</ul>');
                    inList = false;
                }
                resultLines.push(line);
            }
        }
        
        if (inList) {
            resultLines.push('</ul>');
        }
        formatted = resultLines.join('\n');
        
        // 5. 清理多余的空行
        formatted = formatted.replace(/\n{3,}/g, '\n\n');
        
        // 6. 将换行转换为<br>
        formatted = formatted.replace(/\n/g, '<br>');
        
        // 7. 移除可能残留的列表标签错误
        formatted = formatted.replace(/<\/ul>\s*<ul>/g, '');
        
        return formatted;
    }
    
    function setAiTyping(show) {
        const typing = document.getElementById('aiTyping');
        if (show) {
            typing.classList.add('active');
            // 添加一个临时的assistant消息
            addAiMessage('正在思考...', 'assistant');
        } else {
            typing.classList.remove('active');
            // 移除"正在思考"消息
            const messages = document.querySelectorAll('.ai-chat-message.assistant');
            const lastMsg = messages[messages.length - 1];
            if (lastMsg && lastMsg.querySelector('.ai-msg-text').textContent === '正在思考...') {
                lastMsg.remove();
            }
        }
    }
    
    async function sendAiMessage() {
        const input = document.getElementById('aiChatInput');
        const message = input.value.trim();
        if (!message) return;
        
        input.value = '';
        addAiMessage(message, 'user');
        aiConversationHistory.push({role: 'user', content: message});
        
        setAiTyping(true);
        
        try {
            const response = await fetch('/api/ai/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    message: message,
                    history: aiConversationHistory
                })
            });
            
            const data = await response.json();
            setAiTyping(false);
            
            if (data.reply) {
                addAiMessage(data.reply, 'assistant');
                aiConversationHistory.push({role: 'assistant', content: data.reply});
            } else if (data.error) {
                addAiMessage('抱歉，' + data.error, 'assistant');
            }
        } catch (error) {
            setAiTyping(false);
            addAiMessage('抱歉，网络出现了问题，请稍后再试。', 'assistant');
        }
    }
    
    function sendQuickMessage(message) {
        document.getElementById('aiChatInput').value = message;
        sendAiMessage();
    }
    
    function handleAiKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendAiMessage();
        }
    }
